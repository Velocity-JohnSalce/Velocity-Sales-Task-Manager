        .header {
            background: linear-gradient(135deg, #1a3a1a 0%, #2d5a2d 60%, #3d7a3d 100%);

            padding: 16px 28px;
            display: flex;

            border-bottom: 4px solid #5cb85c;
            box-shadow: 0 3px 16px rgba(0,0,0,0.3);

        .header-badge {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px;

            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 7px;

        .header-badge-dot {
            width: 8px; height: 8px;

        .clear-pill {
            padding: 6px 14px; border: 2px dashed #ccc; background: white;
            cursor: pointer; border-radius: 20px; font-size: 12px; color: #888;
            transition: all 0.2s; font-weight: 500;
        }
        .clear-pill:hover { border-color: #999; background: #f5f5f5; color: #555; }
        .search-export { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; align-items: center; }
        .search-box {
            flex: 1; min-width: 220px; padding: 11px 16px;
            border: 2px solid #e0e0e0; border-radius: 10px; font-size: 15px;
            background: white; box-shadow: 0 1px 4px rgba(0,0,0,0.05); transition: border-color 0.2s;
        }
        .search-box:focus { outline: none; border-color: #2d5a2d; box-shadow: 0 0 0 3px rgba(45,90,45,0.1); }
        .action-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-new-task {
            padding: 10px 20px; background: #2d5a2d; color: white; border: none;
            border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 700;
            transition: all 0.2s; box-shadow: 0 2px 8px rgba(45,90,45,0.3);
        }
        .btn-new-task:hover { background: #1f4620; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(45,90,45,0.4); }
        .export-btn { padding: 10px 16px; border: none; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; }
        .export-btn:hover { transform: translateY(-1px); }
        .export-view { background: #2563eb; color: white; box-shadow: 0 2px 8px rgba(37,99,235,0.3); }
        .export-view:hover { background: #1d4ed8; }
        .export-all { background: #2563eb; color: white; box-shadow: 0 2px 8px rgba(37,99,235,0.3); }
        .export-all:hover { background: #1d4ed8; }
        .export-owner { background: #7c3aed; color: white; box-shadow: 0 2px 8px rgba(124,58,237,0.3); }
        .export-owner:hover { background: #6d28d9; }
        .table-wrapper {
            background: white; border-radius: 14px; overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08); border: 1px solid #e8e8e8;
        }
        table { width: 100%; border-collapse: collapse; background: white; }
        thead tr { position: sticky; top: 0; z-index: 10; }
        th {
            background: #f7f8fa; padding: 14px 14px; text-align: left;
            font-weight: 700; font-size: 11px; text-transform: uppercase;
            color: #555; letter-spacing: 0.6px; border-bottom: 2px solid #e8e8e8; white-space: nowrap;
        }
        td { padding: 14px 14px; border-bottom: 1px solid #f0f0f0; font-size: 14.5px; vertical-align: middle; }
        tbody tr { transition: background 0.15s; }
        tbody tr:nth-child(even) td { background: #fafbfc; }
        tbody tr:hover td { background: #f0f7f0 !important; }
        tbody tr:last-child td { border-bottom: none; }
        .status-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 5px 12px; border-radius: 20px; font-size: 12.5px;
            font-weight: 600; white-space: nowrap;
        }
        .status-in-progress { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
        .status-pending { background: #fff7ed; color: #ea580c; border: 1px solid #fed7aa; }
        .status-complete { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
        .task-completed { opacity: 0.55; background: #f3f4f6 !important; }
        .task-completed td { text-decoration: line-through; color: #9ca3af !important; }
        .task-completed .status-badge { opacity: 0.7; }
        .status-on-hold { background: #f9fafb; color: #6b7280; border: 1px solid #d1d5db; }
        .status-info-update { background: #faf5ff; color: #7c3aed; border: 1px solid #ddd6fe; }
        .priority-high { color: #dc2626; font-weight: 700; }
        .priority-medium { color: #d97706; font-weight: 700; }
        .priority-low { color: #16a34a; font-weight: 700; }
        .due-date { font-weight: 600; font-size: 13.5px; }
        .due-date.overdue { color: #dc2626; }
        .due-date.due-soon-2 { color: #ea580c; }
        .due-date.due-soon-7 { color: #d97706; }
        .due-date.due-later { color: #16a34a; }
        .field-with-dropdown {

        .action-icons { display: flex; gap: 6px; align-items: center; }
        .icon-btn { background: #f5f5f5; border: 1px solid #e0e0e0; cursor: pointer; font-size: 15px; padding: 5px 9px; color: #666; transition: all 0.2s; border-radius: 7px; }
        .icon-btn:hover { background: #e8e8e8; color: #333; }
        .dropdown-popup { position: absolute; background: white; border: 1px solid #e0e0e0; border-radius: 10px; box-shadow: 0 6px 20px rgba(0,0,0,0.15); z-index: 1001; min-width: 170px; overflow: hidden; }
        .dropdown-popup-item { padding: 10px 16px; cursor: pointer; font-size: 14px; border-bottom: 1px solid #f5f5f5; transition: background-color 0.15s; }

        .inline-edit-field { position: relative; cursor: text; }
        .inline-edit-input { padding: 6px 8px; border: 2px solid #2563eb; border-radius: 6px; font-size: 14px; font-family: inherit; width: 100%; }
        .edit-input { width:100%; padding:6px 8px; border:1px solid #ddd; border-radius:6px; font-size:13px; font-family:inherit; }
        .edit-textarea { width:100%; padding:6px 8px; border:1px solid #ddd; border-radius:6px; font-size:13px; font-family:inherit; min-height:40px; resize:vertical; }
        .edit-actions { display:flex; gap:6px; align-items:center; }
        .btn-save { padding:6px 12px; background:#16a34a; color:white; border:none; border-radius:6px; cursor:pointer; font-size:12px; font-weight:600; }
        .btn-save:hover { background:#15803d; }
        .btn-cancel { padding:6px 12px; background:#ef4444; color:white; border:none; border-radius:6px; cursor:pointer; font-size:12px; font-weight:600; }

        .no-data { text-align: center; padding: 60px 40px; color: #aaa; font-size: 16px; background: white; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); border: 1px solid #e8e8e8; }
        .no-data-icon { font-size: 40px; margin-bottom: 12px; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.55); z-index:1000; align-items:center; justify-content:center; }
        .modal.show { display:flex; }
        .modal-content { background:white; padding:28px; border-radius:14px; max-width:600px; width:90%; max-height:85vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
        .modal-header { font-size:19px; font-weight:700; margin-bottom:18px; color:#1a1a1a; }

                                                            style={{ marginTop: '12px', width: '100%' }}
                                                        >
                                                            Copy to Clipboard
                                                        </button>
                                                    </div>
                                                </>
                                            )}
                                            {isExpanded && ownerTasks.length === 0 && (
                                                <div style={{ padding: '12px 0', color: '#999', fontSize: '13px' }}>
                                                    No tasks assigned
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                            <div className="form-actions" style={{ marginTop: '16px' }}>
                                <button className="btn-secondary" onClick={() => setShowEmailByOwner(false)}>
                                    Close
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Export Modal */}
                    <div className={`modal ${showExportModal ? 'show' : ''}`}>
                        <div className="modal-content">
                            <div className="modal-header">
                                {exportType === 'view' && 'Export View'}
                                {exportType === 'all' && 'Export All Tasks'}
                                {exportType === 'owner' && 'Export by Owner'}
                            </div>
                            <p style={{ marginBottom: '12px', color: '#666' }}>
                                {exportData.length} task{exportData.length !== 1 ? 's' : ''} will be exported
                            </p>
                            <div className="export-preview">
                                {exportType === 'owner' ? (
                                    <div>
                                        {Object.entries(
                                            exportData.reduce((acc, task) => {
                                                if (!acc[task.owner]) acc[task.owner] = [];
                                                acc[task.owner].push(task);
                                                return acc;
                                            }, {})
                                        ).map(([owner, ownerTasks]) => (
                                            <div key={owner} style={{ marginBottom: '16px' }}>
                                                <strong>{owner}</strong>
                                                <table>
                                                    <thead>
                                                        <tr>
                                                            <th>Client</th>
                                                            <th>Category</th>
                                                            <th>Task</th>
                                                            <th>Due Date</th>
                                                            <th>Status</th>
                                                            <th>Priority</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {ownerTasks.map(task => (
                                                            <tr key={task.id}>
                                                                <td>{task.client}</td>
                                                                <td>{task.category}</td>
                                                                <td>{task.task}</td>
                                                                <td>{task.dueDate}</td>
                                                                <td>{task.status}</td>
                                                                <td>{task.priority}</td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <table>
                                        <thead>
                                            <tr>
                                                <th>Client</th>
                                                <th>Category</th>
                                                <th>Task</th>
                                                <th>Owner</th>
                                                <th>Due Date</th>
                                                <th>Status</th>
                                                <th>Priority</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {exportData.map(task => (
                                                <tr key={task.id}>
                                                    <td>{task.client}</td>
                                                    <td>{task.category}</td>
                                                    <td>{task.task}</td>
                                                    <td>{task.owner}</td>
                                                    <td>{task.dueDate}</td>
                                                    <td>{task.status}</td>
                                                    <td>{task.priority}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                )}
                            </div>
                            <div className="form-actions">
                                <button className="btn-secondary" onClick={() => setShowExportModal(false)}>
                                    Cancel
                                </button>
                                <button className="btn-primary" onClick={downloadXLSX}>
                                    Download XLSX
                                </button>
                            </div>
                        </div>
                    </div>
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TaskManager />);
    </script>
</body>
</html>
